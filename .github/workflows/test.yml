name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -e .[dev]
      - name: Lint with Ruff
        run: ruff check src/ tests/
      - name: Type check with MyPy
        run: mypy src/
      - name: Run tests
        run: pytest tests/ -v --cov=src/coding_agent --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v3
