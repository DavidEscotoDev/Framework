llm:
  providers:
    - name: nvidia-nim
      type: nvidia_nim
      api_base: https://integrate.api.nvidia.com/v1
      api_key_env: NVIDIA_NIM_API_KEY
      models: ["nvidia/nemotron-3-ultra", "meta/llama-3.1-70b-instruct"]
      priority: 1
    - name: openai
      type: openai
      api_key_env: OPENAI_API_KEY
      models: ["gpt-4o", "gpt-4o-mini"]
      priority: 2
    - name: azure
      type: azure_openai
      api_key_env: AZURE_OPENAI_API_KEY
      endpoint_env: AZURE_OPENAI_ENDPOINT
      models: ["gpt-4o"]
      priority: 3
    - name: ollama
      type: ollama
      api_base: http://localhost:11434
      models: ["llama3", "codellama"]
      priority: 4
  fallback_chain: ["nvidia-nim", "openai", "azure", "ollama"]
  defaults:
    temperature: 0.3
    max_tokens: 4000
    timeout_seconds: 60

agents:
  planner:
    temperature: 0.2
    max_tokens: 2000
    prompt_version: "1.0.0"
    timeout_seconds: 30
  coder:
    temperature: 0.3
    max_tokens: 4000
    prompt_version: "1.0.0"
    timeout_seconds: 60
  reviewer:
    temperature: 0.1
    max_tokens: 3000
    prompt_version: "1.0.0"
    quality_threshold: 70
    timeout_seconds: 30
  tester:
    temperature: 0.2
    max_tokens: 3000
    prompt_version: "1.0.0"
    coverage_threshold: 80
    timeout_seconds: 60

sandbox:
  cpu_timeout_seconds: 10
  memory_limit_mb: 512
  production_mode: false
  allowed_imports:
    - json; re; math; datetime; collections; itertools; typing; dataclasses; enum; functools; operator

orchestrator:
  halt_on_review_failure: true
  max_retries: 2
  retry_backoff_base: 2.0
  timeout_seconds: 120
