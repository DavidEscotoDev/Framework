name: Feature Request
description: Suggest an idea for this project
title: "[feat]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature! Please fill out the sections below.
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? What's the use case?
      placeholder: "Currently, users cannot..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work? Describe the API, config, or behavior.
      placeholder: "Add a new config option..."
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider? Why is this the best?
      placeholder: "Considered X but Y because..."
    validations:
      required: false
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the codebase does this affect?
      options:
        - LLM Providers (llm/)
        - Agents (agents/)
        - Orchestrator (orchestrator.py)
        - Sandbox (sandbox/)
        - API (api/)
        - CLI (cli/)
        - Configuration (config.py)
        - Observability (observability/)
        - Documentation
        - Tests
        - Other
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I'm willing to implement this feature
          required: false
        - label: This is a breaking change
          required: false
        - label: I've searched existing issues and PRs
          required: true