version: "3.8"

services:
  app:
    build: .
    runtime: runsc  # gVisor for production
    ports:
      - "8000:8000"
    env_file: .env.prod
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

volumes:
  redis_data:
