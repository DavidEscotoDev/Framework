agents:
  coder:
    max_tokens: 4000
    prompt_version: v1.0.0
    temperature: 0.3
    timeout_seconds: 60
  planner:
    max_tokens: 2000
    prompt_version: v1.0.0
    temperature: 0.2
    timeout_seconds: 30
  reviewer:
    max_tokens: 3000
    prompt_version: v1.0.0
    quality_threshold: 70
    temperature: 0.1
    timeout_seconds: 30
  tester:
    coverage_threshold: 80
    max_tokens: 3000
    prompt_version: v1.0.0
    temperature: 0.2
    timeout_seconds: 60
llm:
  defaults:
    max_tokens: 4000
    temperature: 0.3
    timeout_seconds: 60
  fallback_chain:
  - nvidia-nim
  - openai
  - azure
  - ollama
  providers:
  - api_base: https://integrate.api.nvidia.com/v1
    api_key_env: NVIDIA_NIM_API_KEY
    models:
    - nvidia/nemotron-3-ultra
    - meta/llama-3.1-70b-instruct
    name: nvidia-nim
    priority: 1
    type: nvidia_nim
  - api_key_env: OPENAI_API_KEY
    models:
    - gpt-4o
    - gpt-4o-mini
    name: openai
    priority: 2
    type: openai
  - api_key_env: AZURE_OPENAI_API_KEY
    endpoint_env: AZURE_OPENAI_ENDPOINT
    models:
    - gpt-4o
    name: azure
    priority: 3
    type: azure_openai
  - api_base: http://localhost:11434
    models:
    - llama3
    - codellama
    name: ollama
    priority: 4
    type: ollama
orchestrator:
  halt_on_review_failure: true
  max_retries: 2
  retry_backoff_base: 2.0
  timeout_seconds: 120
sandbox:
  allowed_imports:
  - json; re; math; datetime; collections; itertools; typing; dataclasses; enum; functools;
    operator
  cpu_timeout_seconds: 10
  memory_limit_mb: 512
  production_mode: false
